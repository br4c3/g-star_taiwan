  <g font-family="Arial, sans-serif" text-anchor="middle">
    <path d="M130 145 H1070 L1005 210 H195 Z" fill="#17243b"/><text x="600" y="186" font-size="22" font-weight="700" fill="#fff">잠재고객 20곳</text>
