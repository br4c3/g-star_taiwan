<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">B2B 로컬기프트 가격대별 공급가와 허용 변동원가</title>
  <desc id="desc">라이트, 스탠더드, 프리미엄 상품의 부가세 제외 공급가와 목표 공헌이익률 25퍼센트 적용 시 허용 변동원가를 비교한다.</desc>
  <rect width="1040" height="560" fill="#ffffff"/>
  <text x="60" y="58" font-family="sans-serif" font-size="28" font-weight="700" fill="#17202a">가격대별 공급가와 허용 변동원가</text>
  <text x="60" y="88" font-family="sans-serif" font-size="15" fill="#566573">부가세 제외 · 목표 공헌이익률 25% 가설 · 배송비 별도</text>
  <line x1="105" y1="445" x2="955" y2="445" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="105" y1="125" x2="105" y2="445" stroke="#7f8c8d" stroke-width="1"/>
  <g font-family="sans-serif" font-size="14" fill="#566573" text-anchor="end">
    <text x="94" y="450">0</text><text x="94" y="370">10,000</text><text x="94" y="290">20,000</text><text x="94" y="210">30,000</text><text x="94" y="130">40,000원</text>
  </g>
  <g stroke="#e5e7e9" stroke-width="1">
    <line x1="105" y1="365" x2="955" y2="365"/><line x1="105" y1="285" x2="955" y2="285"/><line x1="105" y1="205" x2="955" y2="205"/><line x1="105" y1="125" x2="955" y2="125"/>
  </g>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="210" y="285" width="70" height="160" fill="#315f72"/><rect x="290" y="325" width="70" height="120" fill="#c48b3c"/>
    <text x="245" y="274" font-size="15" font-weight="700" fill="#17202a">20,000</text><text x="325" y="314" font-size="15" font-weight="700" fill="#17202a">15,000</text><text x="285" y="480" font-size="17" font-weight="700" fill="#17202a">라이트</text>
    <rect x="465" y="205" width="70" height="240" fill="#315f72"/><rect x="545" y="265" width="70" height="180" fill="#c48b3c"/>
    <text x="500" y="194" font-size="15" font-weight="700" fill="#17202a">30,000</text><text x="580" y="254" font-size="15" font-weight="700" fill="#17202a">22,500</text><text x="540" y="480" font-size="17" font-weight="700" fill="#17202a">스탠더드</text>
    <rect x="720" y="125" width="70" height="320" fill="#315f72"/><rect x="800" y="205" width="70" height="240" fill="#c48b3c"/>
    <text x="755" y="114" font-size="15" font-weight="700" fill="#17202a">40,000</text><text x="835" y="194" font-size="15" font-weight="700" fill="#17202a">30,000</text><text x="795" y="480" font-size="17" font-weight="700" fill="#17202a">프리미엄</text>
  </g>
  <g font-family="sans-serif" font-size="14" fill="#34495e">
    <rect x="350" y="515" width="18" height="18" fill="#315f72"/><text x="376" y="529">공급가(부가세 제외)</text>
    <rect x="550" y="515" width="18" height="18" fill="#c48b3c"/><text x="576" y="529">허용 변동원가 상한</text>
  </g>
</svg>
