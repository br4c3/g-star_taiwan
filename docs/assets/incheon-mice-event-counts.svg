<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">인천 MICE 행사 개최 건수</title><desc id="desc">2019년 3404건, 2023년 5858건, 2024년 6827건을 비교한 막대그래프</desc>
  <rect width="1100" height="650" fill="#faf9f6"/>
  <text x="70" y="62" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#171717">인천 MICE 행사 개최 건수</text>
  <text x="70" y="98" font-family="Arial, sans-serif" font-size="17" fill="#595959">공식자료에 제시된 비교연도만 표시 · 단위: 건</text>
  <g stroke="#d2d0ca" stroke-width="1"><line x1="130" y1="520" x2="1020" y2="520"/><line x1="130" y1="410" x2="1020" y2="410"/><line x1="130" y1="300" x2="1020" y2="300"/><line x1="130" y1="190" x2="1020" y2="190"/></g>
  <g font-family="Arial, sans-serif" font-size="15" fill="#666" text-anchor="end"><text x="115" y="526">0</text><text x="115" y="416">2,000</text><text x="115" y="306">4,000</text><text x="115" y="196">6,000</text></g>
  <rect x="220" y="333" width="170" height="187" fill="#a35d4d"/><rect x="490" y="198" width="170" height="322" fill="#52627b"/><rect x="760" y="144" width="170" height="376" fill="#17243b"/>
  <g font-family="Arial, sans-serif" text-anchor="middle"><g font-size="24" font-weight="700" fill="#171717"><text x="305" y="315">3,404</text><text x="575" y="180">5,858</text><text x="845" y="126">6,827</text></g><g font-size="19" fill="#333"><text x="305" y="558">2019</text><text x="575" y="558">2023</text><text x="845" y="558">2024</text></g></g>
  <text x="550" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#595959">주의: 2020~2022년을 생략했으므로 연속 시계열 그래프로 해석하지 않는다.</text>
</svg>
